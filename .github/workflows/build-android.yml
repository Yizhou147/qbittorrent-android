name: Build qBittorrent Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-native:
    name: Build Native Libraries
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker base image
        run: |
          cat > Dockerfile.ci <<'EOF'
          FROM ubuntu:22.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN sed -i 's|http://archive.ubuntu.com|http://mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list && \
              sed -i 's|http://security.ubuntu.com|http://mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list && \
              apt-get update && apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build pkg-config clang perl \
              curl wget unzip tar xz-utils python3 \
              openjdk-17-jdk-headless ca-certificates && \
              rm -rf /var/lib/apt/lists/*
          RUN mkdir -p /build /src /output
          WORKDIR /build
          EOF
          sed -i 's/^          //' Dockerfile.ci
          docker build -t qbt-builder -f Dockerfile.ci .

      - name: Download source packages
        run: |
          mkdir -p ci-sources
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/openssl-3.3.2.tar.gz \
            "https://github.com/openssl/openssl/releases/download/openssl-3.3.2/openssl-3.3.2.tar.gz" || \
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/openssl-3.3.2.tar.gz \
            "https://www.openssl.org/source/openssl-3.3.2.tar.gz"
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/qt-everywhere-src-5.15.2.tar.xz \
            "https://mirrors.tuna.tsinghua.edu.cn/qt/archive/qt/5.15/5.15.2/single/qt-everywhere-src-5.15.2.tar.xz"
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/boost_1_86_0.tar.gz \
            "https://archives.boost.io/release/1.86.0/source/boost_1_86_0.tar.gz"
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/libtorrent-2.0.11.tar.gz \
            "https://github.com/arvidn/libtorrent/releases/download/v2.0.11/libtorrent-rasterbar-2.0.11.tar.gz"
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/qbittorrent-4.6.7.tar.gz \
            "https://github.com/qbittorrent/qBittorrent/archive/refs/tags/release-4.6.7.tar.gz"
          echo "=== Verifying downloads ==="
          ls -lh ci-sources/
          for f in ci-sources/*.tar.*; do
            size=$(stat -c%s "$f")
            echo "$f: $size bytes"
            if [ "$size" -lt 100000 ]; then
              echo "ERROR: $f is too small, download likely failed"
              exit 1
            fi
          done

      - name: Build native libraries in Docker
        run: |
          mkdir -p output ci-patches
          cp docker-sources/qbittorrent/src/app/android_jni_bridge.cpp ci-patches/ 2>/dev/null || true
          cp docker-sources/qbittorrent/src/app/CMakeLists.txt ci-patches/ 2>/dev/null || true
          cp docker-sources/qbittorrent/cmake/Modules/CheckPackages.cmake ci-patches/ 2>/dev/null || true
          chmod +x ci/build-native.sh

          docker run --rm \
            -v ${{ github.workspace }}/ci-sources:/src:ro \
            -v ${{ github.workspace }}/ci-patches:/patches:ro \
            -v ${{ github.workspace }}/ci/build-native.sh:/build.sh:ro \
            -v ${{ github.workspace }}/output:/output \
            qbt-builder \
            bash /build.sh

          echo "Native libraries built successfully"
          ls -lh output/

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: output/
          retention-days: 7

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-native
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libs
          path: apk-project/app/src/main/jniLibs/arm64-v8a/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd apk-project
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: apk-project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apk-project/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
