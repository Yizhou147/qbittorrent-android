name: Build qBittorrent Android

on:
  workflow_dispatch:
    inputs:
      qbittorrent_version:
        description: 'qBittorrent 版本标签'
        required: false
        default: 'v5.0.2'
      libtorrent_version:
        description: 'libtorrent 版本标签'
        required: false
        default: 'v2.0.10'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Set environment variables
        run: |
          TOOLCHAIN="${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          echo "PREFIX=${{ github.workspace }}/output" >> $GITHUB_ENV
          echo "TOOLCHAIN=${TOOLCHAIN}" >> $GITHUB_ENV
          echo "CC=${TOOLCHAIN}/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "CXX=${TOOLCHAIN}/bin/aarch64-linux-android24-clang++" >> $GITHUB_ENV
          echo "AR=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=${TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=${TOOLCHAIN}/bin/llvm-strip" >> $GITHUB_ENV
          echo "CROSS_COMPILE=${TOOLCHAIN}/bin/aarch64-linux-android24-" >> $GITHUB_ENV
          echo "${TOOLCHAIN}/bin" >> $GITHUB_PATH
          mkdir -p ${{ github.workspace }}/output ${{ github.workspace }}/deps

      # ==================== Cache ====================
      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/output
          key: openssl-v2-${{ runner.os }}

      - name: Cache Boost
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps/boost_1_86_0
          key: boost-v2-${{ runner.os }}

      # ==================== OpenSSL ====================
      # 用 linux-aarch64 + CROSS_COMPILE 绕过 OpenSSL 的 android 特定检查
      - name: Build OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}/deps
          curl -fsSL "https://www.openssl.org/source/openssl-3.3.2.tar.gz" | tar xz
          cd openssl-3.3.2

          # 用 linux-aarch64 目标 + CROSS_COMPILE 指向 NDK clang
          # 这样绕过 OpenSSL 内部对 android NDK gcc 的硬检查
          ./Configure linux-aarch64 \
            -D__ANDROID_API__=24 \
            --prefix=${PREFIX} --openssldir=${PREFIX}/ssl \
            no-shared no-tests no-ui-console -fPIC \
            --cross-compile-prefix=aarch64-linux-android24-

          make -j$(nproc) build_libs
          make install_sw

          # 验证
          file ${PREFIX}/lib/libcrypto.a
          echo "✅ OpenSSL done"

      # ==================== Boost ====================
      - name: Build Boost
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}/deps
          curl -fsSL "https://archives.boost.io/release/1.86.0/source/boost_1_86_0.tar.gz" | tar xz
          cd boost_1_86_0

          ./bootstrap.sh --with-toolset=clang

          cat > user-config.jam << EOF
          using clang : android
            : ${CXX}
            : <archiver>${AR}
              <ranlib>${RANLIB}
              <linkflags>-llog
              <compileflags>--target=aarch64-linux-android24
              <compileflags>-fPIC
            ;
          EOF

          ./b2 install \
            --prefix=${PREFIX} \
            --with-system --with-filesystem --with-thread \
            --with-date_time --with-chrono --with-random \
            --with-program_options \
            --user-config=user-config.jam \
            --layout=system \
            toolset=clang-android \
            link=static threading=multi variant=release \
            runtime-link=static target-os=android \
            architecture=arm address-model=64 \
            cxxflags="-std=c++17 --target=aarch64-linux-android24" \
            linkflags="--target=aarch64-linux-android24 -llog" \
            -j$(nproc) --abbreviate-paths -d0

          ls -la ${PREFIX}/lib/libboost_*.a
          echo "✅ Boost done"

      # ==================== libtorrent ====================
      - name: Build libtorrent
        run: |
          QBT_LT_VERSION=${{ github.event.inputs.libtorrent_version || 'v2.0.10' }}
          cd ${{ github.workspace }}
          git clone --depth 1 --branch ${QBT_LT_VERSION} \
            https://github.com/arvidn/libtorrent.git deps/libtorrent-src

          cd deps/libtorrent-src
          mkdir build && cd build

          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_INSTALL_PREFIX=${PREFIX} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBoost_INCLUDE_DIR=${PREFIX}/include \
            -DBoost_SYSTEM_LIBRARY=${PREFIX}/lib/libboost_system.a \
            -DBoost_FILESYSTEM_LIBRARY=${PREFIX}/lib/libboost_filesystem.a \
            -DBoost_THREAD_LIBRARY=${PREFIX}/lib/libboost_thread.a \
            -DBoost_DATE_TIME_LIBRARY=${PREFIX}/lib/libboost_date_time.a \
            -DBoost_CHRONO_LIBRARY=${PREFIX}/lib/libboost_chrono.a \
            -DBoost_RANDOM_LIBRARY=${PREFIX}/lib/libboost_random.a \
            -DBoost_PROGRAM_OPTIONS_LIBRARY=${PREFIX}/lib/libboost_program_options.a \
            -DOPENSSL_ROOT_DIR=${PREFIX} \
            -DOPENSSL_INCLUDE_DIR=${PREFIX}/include \
            -DOPENSSL_CRYPTO_LIBRARY=${PREFIX}/lib/libcrypto.a \
            -DOPENSSL_SSL_LIBRARY=${PREFIX}/lib/libssl.a \
            -DZLIB_ROOT=${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr \
            -Dstatic_runtime=ON \
            -Dencryption=ON

          cmake --build . -j$(nproc)
          cmake --install .
          echo "✅ libtorrent done"

      # ==================== qBittorrent ====================
      - name: Build qBittorrent
        run: |
          QBT_VERSION=${{ github.event.inputs.qbittorrent_version || 'v5.0.2' }}
          cd ${{ github.workspace }}
          git clone --depth 1 --branch ${QBT_VERSION} \
            https://github.com/qbittorrent/qBittorrent.git deps/qbittorrent-src

          cd deps/qbittorrent-src
          mkdir build && cd build

          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_INSTALL_PREFIX=${PREFIX} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DGUI=OFF \
            -DWEBUI=ON \
            -DTESTING=OFF \
            -DBoost_INCLUDE_DIR=${PREFIX}/include \
            -DBoost_SYSTEM_LIBRARY=${PREFIX}/lib/libboost_system.a \
            -DBoost_FILESYSTEM_LIBRARY=${PREFIX}/lib/libboost_filesystem.a \
            -DBoost_THREAD_LIBRARY=${PREFIX}/lib/libboost_thread.a \
            -DBoost_DATE_TIME_LIBRARY=${PREFIX}/lib/libboost_date_time.a \
            -DBoost_CHRONO_LIBRARY=${PREFIX}/lib/libboost_chrono.a \
            -DBoost_RANDOM_LIBRARY=${PREFIX}/lib/libboost_random.a \
            -DBoost_PROGRAM_OPTIONS_LIBRARY=${PREFIX}/lib/libboost_program_options.a \
            -DOPENSSL_ROOT_DIR=${PREFIX} \
            -DOPENSSL_INCLUDE_DIR=${PREFIX}/include \
            -DOPENSSL_CRYPTO_LIBRARY=${PREFIX}/lib/libcrypto.a \
            -DOPENSSL_SSL_LIBRARY=${PREFIX}/lib/libssl.a \
            -DLibtorrentRasterbar_DIR=${PREFIX}/lib/cmake/LibtorrentRasterbar \
            -DZLIB_ROOT=${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr

          cmake --build . -j$(nproc)
          cmake --install .
          echo "✅ qBittorrent done"

      # ==================== 打包 ====================
      - name: Package artifacts
        run: |
          mkdir -p ${{ github.workspace }}/release/lib
          cp ${{ env.PREFIX }}/bin/qbittorrent-nox ${{ github.workspace }}/release/
          cp ${{ env.PREFIX }}/lib/*.so ${{ github.workspace }}/release/lib/ 2>/dev/null || true
          ${{ env.STRIP }} ${{ github.workspace }}/release/qbittorrent-nox 2>/dev/null || true

          cat > ${{ github.workspace }}/release/install.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          TARGET="/data/local/qbittorrent"
          echo "=== 安装 qBittorrent 到 $TARGET ==="
          mkdir -p "$TARGET"
          cp qbittorrent-nox "$TARGET/"
          chmod 755 "$TARGET/qbittorrent-nox"
          cat > "$TARGET/start.sh" << 'EOF'
          #!/system/bin/sh
          cd /data/local/qbittorrent
          ./qbittorrent-nox --profile=. --save-path=/sdcard/Downloads/qBittorrent --webui-port=8080 --daemon
          EOF
          chmod 755 "$TARGET/start.sh"
          echo "✅ 安装完成! WebUI: http://localhost:8080 默认账号: admin / adminadmin"
          SCRIPT
          chmod +x ${{ github.workspace }}/release/install.sh

          cd ${{ github.workspace }}/release
          tar czf ${{ github.workspace }}/qbittorrent-android-arm64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qbittorrent-android-arm64
          path: ${{ github.workspace }}/qbittorrent-android-arm64.tar.gz
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/qbittorrent-android-arm64.tar.gz
          generate_release_notes: true
