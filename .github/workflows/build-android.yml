name: Build qBittorrent Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-native:
    name: Build Native Libraries
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker base image
        run: |
          cat > Dockerfile.ci <<'EOF'
          FROM ubuntu:22.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN sed -i 's|http://archive.ubuntu.com|http://mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list && \
              sed -i 's|http://security.ubuntu.com|http://mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list && \
              apt-get update && apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build pkg-config clang perl \
              curl wget unzip tar xz-utils python3 \
              openjdk-17-jdk-headless ca-certificates && \
              rm -rf /var/lib/apt/lists/*
          RUN mkdir -p /build /src /output
          WORKDIR /build
          EOF
          sed -i 's/^          //' Dockerfile.ci
          docker build -t qbt-builder -f Dockerfile.ci .

      - name: Download source packages
        run: |
          mkdir -p ci-sources
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/openssl-3.3.2.tar.gz \
            "https://github.com/openssl/openssl/releases/download/openssl-3.3.2/openssl-3.3.2.tar.gz" || \
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/openssl-3.3.2.tar.gz \
            "https://www.openssl.org/source/openssl-3.3.2.tar.gz"
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/qt-everywhere-src-5.15.2.tar.xz \
            "https://mirrors.tuna.tsinghua.edu.cn/qt/archive/qt/5.15/5.15.2/single/qt-everywhere-src-5.15.2.tar.xz"
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/boost_1_86_0.tar.gz \
            "https://archives.boost.io/release/1.86.0/source/boost_1_86_0.tar.gz"
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/libtorrent-2.0.11.tar.gz \
            "https://github.com/arvidn/libtorrent/releases/download/v2.0.11/libtorrent-rasterbar-2.0.11.tar.gz"
          curl -L --retry 3 --connect-timeout 30 -o ci-sources/qbittorrent-4.6.7.tar.gz \
            "https://github.com/qbittorrent/qBittorrent/archive/refs/tags/release-4.6.7.tar.gz"
          echo "=== Verifying downloads ==="
          ls -lh ci-sources/
          for f in ci-sources/*.tar.*; do
            size=$(stat -c%s "$f")
            echo "$f: $size bytes"
            if [ "$size" -lt 100000 ]; then
              echo "ERROR: $f is too small, download likely failed"
              exit 1
            fi
          done

      - name: Build native libraries in Docker
        run: |
          mkdir -p output ci-patches
          cp docker-sources/qbittorrent/src/app/android_jni_bridge.cpp ci-patches/ 2>/dev/null || true
          cp docker-sources/qbittorrent/src/app/CMakeLists.txt ci-patches/ 2>/dev/null || true
          cp docker-sources/qbittorrent/cmake/Modules/CheckPackages.cmake ci-patches/ 2>/dev/null || true

          docker run --rm \
            -v ${{ github.workspace }}/ci-sources:/src:ro \
            -v ${{ github.workspace }}/ci-patches:/src/qbittorrent-patch:ro \
            -v ${{ github.workspace }}/output:/output \
            qbt-builder \
            bash -c '
            set -ex

            # Install Android NDK
            echo "=== Installing Android NDK ==="
            curl -fsSL -o /tmp/ndk.zip https://dl.google.com/android/repository/android-ndk-r27b-linux.zip
            unzip -q /tmp/ndk.zip -d /opt/
            mv /opt/android-ndk-r27b /opt/ndk
            rm /tmp/ndk.zip

            export ANDROID_NDK_HOME=/opt/ndk
            export TOOLCHAIN=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64
            export TARGET=aarch64-linux-android35
            export API=35
            export CC=${TOOLCHAIN}/bin/${TARGET}-clang
            export CXX=${TOOLCHAIN}/bin/${TARGET}-clang++
            export AR=${TOOLCHAIN}/bin/llvm-ar
            export RANLIB=${TOOLCHAIN}/bin/llvm-ranlib
            export STRIP=${TOOLCHAIN}/bin/llvm-strip

            # Step 1: Build OpenSSL
            echo "=== Step 1: Build OpenSSL ==="
            cd /build
            tar xzf /src/openssl-3.3.2.tar.gz
            cd openssl-3.3.2
            ./Configure android-arm64 no-shared no-tests \
              --prefix=/opt/openssl \
              -D__ANDROID_API__=${API}
            make -j$(nproc) build_libs
            make install_dev
            cd /build && rm -rf openssl-3.3.2
            echo "Done: OpenSSL"

            # Step 2: Build Qt5
            echo "=== Step 2: Build Qt5 ==="
            cd /build
            tar xf /src/qt-everywhere-src-5.15.2.tar.xz
            cd qt-everywhere-src-5.15.2

            # Patch: disable JNI_OnLoad in androidjnimain.cpp
            sed -i "s/JNI_OnLoad/JNI_OnLoad_Disabled/g" \
              qtbase/src/android/jar/src/org/qtproject/qt5/android/bindings/qt/src/androidjnimain.cpp

            # Patch: add JNI_OnLoad to qjnihelpers.cpp
            cat >> qtbase/src/corelib/kernel/qjnihelpers.cpp << '"'"'PATCH'"'"'

            extern "C" JNIEXPORT jint JNICALL JNI_OnLoad(JavaVM *vm, void * /*reserved*/)
            {
                extern JavaVM *g_javaVM;
                g_javaVM = vm;
                return JNI_VERSION_1_6;
            }
            PATCH

            # Patch: NULL check in qjni.cpp
            sed -i "s/vm->GetEnv(\&env, JNI_VERSION_1_6)/vm ? vm->GetEnv(\&env, JNI_VERSION_1_6) : -1/g" \
              qtbase/src/corelib/kernel/qjni.cpp

            mkdir -p /build/qt5-build && cd /build/qt5-build
            export PATH=${TOOLCHAIN}/bin:$PATH

            ../qt-everywhere-src-5.15.2/configure \
              -prefix /opt/qt5 \
              -platform linux-g++ \
              -xplatform android-clang \
              -android-ndk ${ANDROID_NDK_HOME} \
              -android-ndk-host linux-x86_64 \
              -android-arch arm64-v8a \
              -android-abis arm64-v8a \
              -no-gui -no-widgets \
              -no-opengl -no-vulkan \
              -openssl-linked -I/opt/openssl/include -L/opt/openssl/lib \
              -skip qtx11extras -skip qtmacextras -skip qtwinextras \
              -skip qtdeclarative -skip qtquickcontrols -skip qtquickcontrols2 \
              -skip qtmultimedia -skip qtwebengine -skip qtwebview \
              -skip qt3d -skip qtcanvas3d -skip qtcharts -skip qtdatavis3d \
              -skip qtgamepad -skip qtnetworkauth -skip qtpurchasing \
              -skip qtremoteobjects -skip qtscxml -skip qtsensors \
              -skip qtserialbus -skip qtserialport -skip qtspeech \
              -skip qtvirtualkeyboard -skip qtwebchannel -skip qtwebsockets \
              -skip qtsvg -skip qtgraphicaleffects -skip qtimageformats \
              -skip qtlottie -skip qtdoc \
              -nomake tests -nomake examples \
              -confirm-license \
              -opensource

            make -j$(nproc)
            make install
            cd /build && rm -rf qt5-build qt-everywhere-src-5.15.2
            echo "Done: Qt5"

            # Step 3: Build Boost
            echo "=== Step 3: Build Boost ==="
            cd /build
            tar xzf /src/boost_1_86_0.tar.gz
            cd boost_1_86_0
            echo "using clang : : ${CXX} : <archiver>${AR} <ranlib>${RANLIB} ;" > user-config.jam
            ./bootstrap.sh --prefix=/opt/boost
            ./b2 install --user-config=user-config.jam \
              toolset=clang \
              link=shared \
              threading=multi \
              variant=release \
              --with-system \
              -j$(nproc)
            cd /build && rm -rf boost_1_86_0
            echo "Done: Boost"

            # Step 4: Build libtorrent
            echo "=== Step 4: Build libtorrent ==="
            cd /build
            tar xzf /src/libtorrent-2.0.11.tar.gz
            cd libtorrent-rasterbar-2.0.11
            mkdir build && cd build
            cmake .. \
              -DCMAKE_SYSTEM_NAME=Android \
              -DCMAKE_SYSTEM_VERSION=${API} \
              -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
              -DCMAKE_ANDROID_NDK=${ANDROID_NDK_HOME} \
              -DCMAKE_C_COMPILER=${CC} \
              -DCMAKE_CXX_COMPILER=${CXX} \
              -DCMAKE_CXX_STANDARD=17 \
              -DCMAKE_INSTALL_PREFIX=/opt/libtorrent \
              -DCMAKE_BUILD_TYPE=Release \
              -DBoost_INCLUDE_DIR=/opt/boost/include \
              -DBoost_SYSTEM_LIBRARY=/opt/boost/lib/libboost_system.so \
              -Dshared=ON \
              -Dstatic=OFF
            make -j$(nproc)
            make install
            cd /build && rm -rf libtorrent-rasterbar-2.0.11
            echo "Done: libtorrent"

            # Step 5: Build qBittorrent
            echo "=== Step 5: Build qBittorrent ==="
            cd /build
            tar xzf /src/qbittorrent-4.6.7.tar.gz
            cd qbittorrent-4.6.7

            # Copy patched JNI bridge
            if [ -f /src/qbittorrent-patch/android_jni_bridge.cpp ]; then
              cp /src/qbittorrent-patch/android_jni_bridge.cpp src/app/
            fi
            if [ -f /src/qbittorrent-patch/CMakeLists.txt ]; then
              cp /src/qbittorrent-patch/CMakeLists.txt src/app/
            fi
            if [ -f /src/qbittorrent-patch/CheckPackages.cmake ]; then
              cp /src/qbittorrent-patch/CheckPackages.cmake cmake/Modules/
            fi

            mkdir build && cd build
            export CMAKE_PREFIX_PATH="/opt/qt5;/opt/libtorrent;/opt/boost;/opt/openssl"
            export LD_LIBRARY_PATH="/opt/qt5/lib:/opt/libtorrent/lib:/opt/boost/lib:/opt/openssl/lib"

            cmake .. \
              -DCMAKE_SYSTEM_NAME=Android \
              -DCMAKE_SYSTEM_VERSION=${API} \
              -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
              -DCMAKE_ANDROID_NDK=${ANDROID_NDK_HOME} \
              -DCMAKE_C_COMPILER=${CC} \
              -DCMAKE_CXX_COMPILER=${CXX} \
              -DCMAKE_CXX_STANDARD=17 \
              -DCMAKE_INSTALL_PREFIX=/usr/local \
              -DCMAKE_BUILD_TYPE=Release \
              -DQT6=OFF \
              -DWEBUI=ON \
              -DSTACKTRACE=OFF \
              -DTESTING=OFF

            make -j$(nproc)

            # Collect output
            QBT_LIB=$(find . -name "libqbt*.so" -not -path "*_autogen*" | head -1)
            cp "$QBT_LIB" /output/libqbt.so
            ${STRIP} /output/libqbt.so

            echo "Done: qBittorrent"
            ls -lh /output/libqbt.so
            '

          echo "Native libraries built successfully"
          ls -lh output/

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: output/
          retention-days: 7

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-native
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libs
          path: apk-project/app/src/main/jniLibs/arm64-v8a/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd apk-project
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: apk-project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apk-project/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
