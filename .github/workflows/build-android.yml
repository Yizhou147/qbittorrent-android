name: Build qBittorrent Android

on:
  workflow_dispatch:
    inputs:
      qbittorrent_version:
        description: 'qBittorrent 版本标签'
        required: false
        default: 'release-4.6.7'
      libtorrent_version:
        description: 'libtorrent 版本标签'
        required: false
        default: 'v2.0.13'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build qBittorrent using Docker
        run: |
          # 构建 Docker 镜像
          docker build -t qbittorrent-android-builder .

          # 创建临时容器并提取产物
          docker create --name qbt-temp qbittorrent-android-builder
          mkdir -p ${{ github.workspace }}/output
          docker cp qbt-temp:/output/qbittorrent-nox ${{ github.workspace }}/output/
          docker rm qbt-temp

          echo "✅ qBittorrent 编译完成"

      - name: Package artifacts
        run: |
          mkdir -p ${{ github.workspace }}/release/lib

          # 复制二进制
          cp ${{ github.workspace }}/output/qbittorrent-nox ${{ github.workspace }}/release/

          # Strip 减小体积
          strip ${{ github.workspace }}/release/qbittorrent-nox 2>/dev/null || true

          # 生成安装脚本
          cat > ${{ github.workspace }}/release/install.sh << 'SCRIPT'
          #!/bin/bash
          # qBittorrent Android 安装脚本 (需要 root)
          set -e
          TARGET="/data/local/qbittorrent"
          echo "=== 安装 qBittorrent 到 $TARGET ==="
          mkdir -p "$TARGET"
          cp qbittorrent-nox "$TARGET/"
          chmod 755 "$TARGET/qbittorrent-nox"
          cat > "$TARGET/start.sh" << 'EOF'
          #!/system/bin/sh
          cd /data/local/qbittorrent
          ./qbittorrent-nox --profile=. --save-path=/sdcard/Downloads/qBittorrent --webui-port=8080 --daemon
          EOF
          chmod 755 "$TARGET/start.sh"
          echo "✅ 安装完成!"
          echo "启动: adb shell $TARGET/start.sh"
          echo "WebUI: http://localhost:8080"
          echo "默认账号: admin / adminadmin"
          SCRIPT
          chmod +x ${{ github.workspace }}/release/install.sh

          # 打包 tar.gz
          cd ${{ github.workspace }}/release
          tar czf ${{ github.workspace }}/qbittorrent-android-arm64.tar.gz .

          # 显示产物信息
          ls -lh ${{ github.workspace }}/qbittorrent-android-arm64.tar.gz
          echo "✅ 打包完成"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qbittorrent-android-arm64
          path: ${{ github.workspace }}/qbittorrent-android-arm64.tar.gz
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/qbittorrent-android-arm64.tar.gz
          generate_release_notes: true
